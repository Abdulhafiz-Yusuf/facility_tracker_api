spring:
  application:
    name: facility_tracker-api

  jpa:
    hibernate:
      ddl-auto: validate   # Hibernate checks entities MATCH the schema, never changes it
    show-sql: true
  flyway:
      enabled: true
      locations: classpath:db/migration

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
